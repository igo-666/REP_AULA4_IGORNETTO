<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque - Premium Motors</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <nav class="navbar">
    <h1 class="logo">PREMIUM MOTORS</h1>

    <ul class="menu">
      <li><a href="index.html">Início</a></li>
      <li><a href="estoque.html">Estoque</a></li>
      <li>
  <a href="favoritos.html">
    Favoritos (<span id="contador-favoritos">0</span>)
  </a>
</li>
      <li><a href="recomendador.html">Descubra seu carro ideal</a></li>
      <li><a href="contato.html">Contato</a></li>
      <li><a href="localizacao.html">Localização</a></li>
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
  </nav>
</header>

<main>

  <!-- FILTROS -->
  <section class="filtros">

    <select id="filtro-tipo">
      <option value="">Todos</option>
      <option value="carro">Carro</option>
      <option value="SUV">SUV</option>
    </select>

    <input 
      type="number" 
      id="filtro-preco" 
      placeholder="Preço máximo"
    >

    <select id="ordenar">
      <option value="">Ordenar</option>
      <option value="menor">Menor preço</option>
      <option value="maior">Maior preço</option>
      <option value="novo">Mais novo</option>
      <option value="km">Menor KM</option>
    </select>

  </section>

  <!-- CONTADOR -->
  <p id="contador-resultados"></p>

  <!-- LISTA -->
  <div id="lista-carros"></div>

  <!-- MENSAGEM -->
  <p id="sem-resultado" class="empty" style="display:none;">
    Nenhum carro encontrado
  </p>

</main>

<footer>
  <p>© 2026 PREMIUM MOTORS</p>
  <p>Contato: (27) 99999-9999</p>
</footer>

<script src="JS/main.js"></script>
