<main>

  <!-- FILTROS -->
  <section class="filtros">

    <input type="text" id="busca-nome" placeholder="Buscar por nome...">

    <select id="filtro-tipo">
      <option value="">Todos</option>
      <option value="carro">Carro</option>
      <option value="SUV">SUV</option>
    </select>

<input type="text" id="filtro-preco" placeholder="Preço máximo">

    <input type="number" id="filtro-ano-min" placeholder="Ano mín." min="1900" max="2100">
    <input type="number" id="filtro-ano-max" placeholder="Ano máx." min="1900" max="2100">
    <input type="number" id="filtro-km-max" placeholder="KM máx." min="0">

    <select id="ordenar">
      <option value="">Ordenar</option>
      <option value="menor">Menor preço</option>
      <option value="maior">Maior preço</option>
      <option value="novo">Mais novo</option>
      <option value="km">Menor KM</option>
    </select>

    <button id="btn-limpar-filtros" class="btn btn-secundario" type="button">Limpar</button>

  </section>

  <!-- CONTADOR -->
  <p id="contador-resultados"></p>

  <!-- LISTA -->
  <div id="lista-carros"></div>

  <!-- MENSAGEM -->
  <p id="sem-resultado" class="empty" style="display:none;">
    Nenhum carro encontrado
  </p>
