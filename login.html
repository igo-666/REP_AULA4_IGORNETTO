<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login Admin - Premium Motors</title>

  <style>
    body {
      background: #0A0A0A;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #111;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #1A1A1A;
      border: none;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #C9A95D;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login Admin</h2>

  <input id="email" placeholder="Email">
 <div style="position: relative;">
  <input id="senha" type="password" placeholder="Senha" style="width:100%; padding-right:40px;">
  
  <span id="toggle-senha"
        style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
    👁️
  </span>
</div>
  <button id="btn-login">Entrar</button>
  
</div>

<script type="module" src="JS/site.js"></script>
<script type="module">

import { auth, signInWithEmailAndPassword } from "./JS/firebase.js";

const btn = document.getElementById("btn-login");

btn.addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await signInWithEmailAndPassword(auth, email, senha);

    const raw = new URLSearchParams(window.location.search).get("next");
    const dest =
      raw === "admin.html" || (typeof raw === "string" && raw.startsWith("admin.html?"))
        ? raw
        : "admin.html";

    alert("Login realizado!");
    window.location.href = dest;

  } catch (erro) {
    alert("Erro no login: " + erro.message);
  }

});

const inputSenha = document.getElementById("senha");
const toggle = document.getElementById("toggle-senha");

if (toggle && inputSenha) {
  toggle.addEventListener("click", () => {

    if (inputSenha.type === "password") {
      inputSenha.type = "text";
      toggle.textContent = "🙈";
    } else {
      inputSenha.type = "password";
      toggle.textContent = "👁️";
    }

  });
}

</script>

</body>
</html>
